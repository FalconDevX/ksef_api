services:
  backend:
    build: .
    container_name: ksef-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PDF_SERVICE_URL: http://ksef-pdf:8080
      DATABASE_URL: postgresql+psycopg://ksef_user:${POSTGRES_PASSWORD}@ksef-postgres:5432/ksef
    depends_on:
      - pdf
      - postgres
    networks:
      - ksef-network

  pdf:
    build:
      context: ./ksef-pdf-service
    container_name: ksef-pdf
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - ksef-network

  postgres:
    image: postgres:16-alpine
    container_name: ksef-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ksef_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ksef
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - ksef-network

networks:
  ksef-network:
    external: true

volumes:
  postgres_data:
