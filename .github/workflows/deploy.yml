name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: raspberry-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - Linux
      - ARM64

    steps:
      - name: Deploy application
        run: |
          set -e
          cd /home/mati/ksef_api
          git pull --ff-only origin main
          docker compose up -d --build
          docker image prune -f
